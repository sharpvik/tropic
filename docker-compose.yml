services:
  agent:
    build: .
    # Or pull a published image instead of building:
    # image: ghcr.io/your-org/gitlab-claude-agent:latest
    image: gitlab-claude-agent:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - gitlab-claude-agent.env
    volumes:
      - claude-data:/data
      - claude-workspaces:/workspaces

volumes:
  claude-data:
  claude-workspaces:
